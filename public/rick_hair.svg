<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <radialGradient id="hairGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="70%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main spiky hair silhouette -->
  <path d="M10 80 
           C 5 70, 0 50, 5 40 
           L 15 35 
           L 10 15 
           L 30 30 
           L 40 5 
           L 55 25 
           L 70 10 
           L 75 30 
           L 95 20 
           L 85 40 
           C 95 50, 95 70, 90 80 
           C 60 90, 40 90, 10 80 Z" 
        fill="url(#hairGlow)" 
        stroke="#cffafe" 
        stroke-width="2" 
        stroke-linejoin="round"
        filter="url(#neon)"/>
</svg>
